<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Image Label Generator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        width: 420px;
        background: #111827;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
	position: relative;
    }

    h2 {
        margin-top: 0;
        font-size: 18px;
    }

    input {
        width: 100%;
        margin-top: 10px;
    }

    button {
        width: 100%;
        margin-top: 12px;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #6366f1;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #4f46e5;
    }

    #output {
        margin-top: 16px;
        padding-top: 10px;
    }

    .label {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #1f2937;
    }

    .name {
        font-weight: 600;
    }

    .confidence {
        color: #a1a1aa;
    }

    .status {
        margin-top: 10px;
        font-size: 13px;
        color: #9ca3af;
    }

    #preview {
        border: 1px solid #1f2937;
    }

    .loader-overlay {
    	position: absolute;
    	top: 0;
    	left: 0;
    	width: 100%;
    	height: 100%;
    	background: rgba(15, 23, 42, 0.85);
    	display: flex;
    	flex-direction: column;
    	justify-content: center;
    	align-items: center;
    	border-radius: 12px;
    	backdrop-filter: blur(4px);
    }

    .spinner {
    	width: 45px;
    	height: 45px;
    	border: 4px solid #1f2937;
    	border-top: 4px solid #6366f1;
    	border-radius: 50%;
    	animation: spin 1s linear infinite;
    }

    .loader-text {
    	margin-top: 12px;
    	color: #cbd5e1;
    	font-size: 14px;
    }

    @keyframes spin {
    	0% { transform: rotate(0deg); }
    	100% { transform: rotate(360deg); }
    }

</style>
</head>

<body>

<div class="card">
    <h2>AI Image Label Generator</h2>

    <input type="file" id="fileInput" accept="image/*" />

    <img id="preview" style="width:100%; margin-top:10px; border-radius:8px; display:none;" />

    <button onclick="uploadImage()">Analyse Image</button>

    <div id="loader" class="loader-overlay" style="display:none;">
        <div class="spinner"></div>
    	<div class="loader-text">Processing...</div>
    </div>

    <div class="status" id="status"></div>

    <div id="output"></div>
</div>

<script>

const API_URL = "https://gdshi77ce0.execute-api.ap-southeast-2.amazonaws.com/dev/analyse";
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const loader = document.getElementById("loader");

function showLoader(text = "Processing...") {
    loader.style.display = "flex";
    loader.querySelector(".loader-text").innerText = text;
}

function hideLoader() {
    loader.style.display = "none";
}

fileInput.addEventListener("change", function () {
    const file = this.files[0];

    if (!file) {
        preview.style.display = "none";
        return;
    }

    const reader = new FileReader();

    reader.onload = function (e) {
        preview.src = e.target.result;
        preview.style.display = "block";
    };

    reader.readAsDataURL(file);
});

async function uploadImage() {

    const file = document.getElementById("fileInput").files[0];
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    output.innerHTML = "";

    if (!file) {
        alert("Select an image first");
        return;
    }

    const fileName = Date.now() + "-" + file.name;

    try {

        // STEP 1: GET PRESIGNED URL
        showLoader("Getting upload link...");

        const res1 = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                action: "getUploadUrl",
                fileName,
                contentType: file.type
            })
        });

        const data1 = await res1.json();

        // STEP 2: UPLOAD TO S3
        showLoader("Uploading image...");

        await fetch(data1.uploadUrl, {
            method: "PUT",
            headers: {
                "Content-Type": file.type
            },
            body: file
        });

        // STEP 3: ANALYSE IMAGE
        showLoader("Analysing image...");

        const res2 = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                action: "analyse",
                key: fileName
            })
        });

        const data2 = await res2.json();

        // STEP 4: RENDER RESULTS
        hideLoader();

        data2.labels.forEach(label => {

            const div = document.createElement("div");
            div.className = "label";

            div.innerHTML = `
                <div class="name">${label.name}</div>
                <div class="confidence">${label.confidence.toFixed(2)}%</div>
            `;

            output.appendChild(div);
        });

    } catch (err) {
        console.error(err);
        status.innerText = "Error occurred";
        alert("Something went wrong. Check console.");
    }
}

</script>

</body>
</html>
